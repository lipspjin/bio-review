<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 初中生物中考复习</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
    min-height: 100vh;
    padding: 20px;
  }
  /* ─── 主容器 ─── */
  .app {
    max-width: 900px; margin: 0 auto;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
    border-radius: 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    padding: 24px 28px 32px;
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  /* ─── 头部 ─── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
  }
  .header h1 {
    font-size: 26px; font-weight: 700;
    background: linear-gradient(135deg, #2e7d32, #66bb6a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }
  .header .score {
    font-size: 15px; color: #555;
    background: #f0f7f0; padding: 6px 16px; border-radius: 30px;
    display: flex; align-items: center; gap: 6px;
  }
  .header .score strong { color: #2e7d32; font-size: 18px; }
  .reset-btn {
    background: #fff; border: 2px solid #ef5350; color: #c62828;
    padding: 5px 14px; border-radius: 20px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all 0.3s;
    white-space: nowrap;
  }
  .reset-btn:hover { background: #ffebee; transform: scale(1.03); }

  /* ─── 导航标签 ─── */
  .tabs {
    display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto;
    margin-bottom: 16px; border-bottom: 2px solid #e8f0e8; padding-bottom: 2px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 16px; cursor: pointer; border-radius: 20px 20px 0 0;
    font-size: 14px; font-weight: 500; color: #666; transition: all 0.3s;
    background: transparent; border: none; position: relative; user-select: none;
  }
  .tab:hover { color: #2e7d32; background: #f0f7f0; }
  .tab.active { color: #1b5e20; background: #e8f5e9; font-weight: 600; }
  .tab.active::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 3px; background: #43a047; border-radius: 3px 3px 0 0;
  }
  .tab .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }
  .dot.done { background: #43a047; }
  .dot.partial { background: #ffa726; }
  .dot.none { background: #bdbdbd; }

  /* ─── 内容区 ─── */
  .content { min-height: 400px; }

  /* ─── 总览页 ─── */
  .overview-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
    gap: 16px; margin-top: 8px;
  }
  .overview-card {
    background: #fafffa; border-radius: 16px; padding: 18px 16px 16px;
    border: 1px solid #e0f0e0; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden;
  }
  .overview-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.06); }
  .overview-card .card-icon { font-size: 32px; margin-bottom: 6px; }
  .overview-card h3 { font-size: 16px; color: #1b5e20; margin-bottom: 4px; }
  .overview-card p { font-size: 13px; color: #777; margin-bottom: 10px; line-height: 1.4; }
  .overview-card .bar-wrap {
    height: 6px; background: #e8f0e8; border-radius: 3px; overflow: hidden;
  }
  .overview-card .bar {
    height: 100%; border-radius: 3px; transition: width 0.8s ease;
    background: linear-gradient(90deg, #66bb6a, #43a047);
  }
  .overview-card .bar-label {
    font-size: 12px; color: #888; margin-top: 4px; display: flex; justify-content: space-between;
  }

  /* ─── 知识点面板 ─── */
  .topic-content { display: none; }
  .topic-content.active { display: block; animation: slideIn 0.4s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
  .topic-content h2 { font-size: 22px; color: #1b5e20; margin: 8px 0 14px; display: flex; align-items: center; gap: 10px; }
  .topic-content h2 small { font-size: 14px; font-weight: 400; color: #888; }

  /* ─── 知识点卡片 ─── */
  .knowledge-card {
    background: #fff; border-radius: 14px; padding: 16px 18px;
    margin-bottom: 14px; border: 1px solid #e8f0e8;
    transition: box-shadow 0.2s;
  }
  .knowledge-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.04); }
  .knowledge-card .k-title {
    font-weight: 600; font-size: 15px; color: #2e7d32; margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .knowledge-card .k-title .num {
    background: #e8f5e9; width: 24px; height: 24px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; color: #2e7d32; flex-shrink: 0;
  }
  .knowledge-card .k-body {
    font-size: 14px; color: #444; line-height: 1.7;
  }
  .knowledge-card .k-body .highlight {
    background: #fff8e1; padding: 0 4px; border-radius: 3px; font-weight: 500; color: #e65100;
  }
  .knowledge-card .k-body .tag {
    display: inline-block; background: #e3f2fd; color: #1565c0;
    font-size: 12px; padding: 2px 8px; border-radius: 10px; margin: 2px;
  }

  /* ─── SVG 插图区 ─── */
  .svg-illustration {
    display: flex; justify-content: center; margin: 10px 0 16px;
    background: #fafff5; border-radius: 12px; padding: 12px;
    border: 1px dashed #c8e6c9;
  }
  .svg-illustration svg { max-width: 100%; height: auto; }

  /* ─── 动画区 ─── */
  .anim-box {
    background: #f5fbf5; border-radius: 12px; padding: 14px 18px;
    margin: 8px 0 14px; border: 1px solid #c8e6c9;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .anim-box .label { font-size: 13px; color: #666; }
  .anim-box .anim-btn {
    padding: 6px 18px; border: none; background: #43a047; color: #fff;
    border-radius: 20px; cursor: pointer; font-size: 13px; transition: background 0.3s;
  }
  .anim-box .anim-btn:hover { background: #2e7d32; }

  /* 呼吸动画演示 */
  .breath-demo {
    display: flex; align-items: center; gap: 20px;
  }
  .lung {
    width: 60px; height: 80px; background: #ef9a9a; border-radius: 50%;
    position: relative; transition: all 1s ease-in-out;
  }
  .lung.inhale { transform: scale(1.15); background: #e57373; }

  /* 食物链动画 */
  .food-chain {
    display: flex; align-items: center; gap: 6px; font-size: 28px;
    justify-content: center; flex-wrap: wrap;
  }
  .food-chain .arrow { color: #43a047; font-weight: bold; font-size: 24px; transition: transform 0.3s; }
  .food-chain .arrow.pulse { animation: arrowPulse 0.6s ease; }
  @keyframes arrowPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

  /* ─── 练习区 ─── */
  .quiz-section {
    margin-top: 20px; padding-top: 16px;
    border-top: 2px dashed #c8e6c9;
  }
  .quiz-section h3 {
    font-size: 17px; color: #1b5e20; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .quiz-card {
    background: #fafffa; border-radius: 14px; padding: 16px 18px;
    border: 1px solid #e0f0e0; margin-bottom: 12px;
  }
  .quiz-card .q-text {
    font-size: 15px; font-weight: 500; color: #333; margin-bottom: 10px;
    line-height: 1.6;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-opt {
    padding: 10px 14px; border-radius: 10px; cursor: pointer;
    border: 2px solid #e0e0e0; font-size: 14px; transition: all 0.25s;
    display: flex; align-items: center; gap: 8px; background: #fff;
    user-select: none;
  }
  .quiz-opt:hover { border-color: #a5d6a7; background: #f1f8e9; }
  .quiz-opt.selected { border-color: #43a047; background: #e8f5e9; }
  .quiz-opt.correct { border-color: #43a047; background: #e8f5e9; }
  .quiz-opt.correct::after { content: ' ✓'; color: #2e7d32; font-weight: bold; margin-left: auto; }
  .quiz-opt.wrong { border-color: #ef5350; background: #ffebee; }
  .quiz-opt.wrong::after { content: ' ✗'; color: #c62828; font-weight: bold; margin-left: auto; }
  .quiz-opt.disabled { pointer-events: none; }
  .quiz-result {
    margin-top: 8px; font-size: 14px; padding: 8px 12px;
    border-radius: 8px; display: none;
  }
  .quiz-result.show { display: block; animation: fadeIn 0.3s ease; }
  .quiz-result.correct { background: #e8f5e9; color: #2e7d32; }
  .quiz-result.wrong { background: #ffebee; color: #c62828; }

  /* ─── 练习面板 (整体练习模式) ─── */
  .practice-panel { display: none; }
  .practice-panel.active { display: block; animation: slideIn 0.4s ease; }
  .practice-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
  }
  .practice-header .p-info { font-size: 14px; color: #666; }
  .practice-header .p-info strong { color: #2e7d32; font-size: 18px; }
  .practice-header .p-progress {
    height: 4px; background: #e8f0e8; border-radius: 2px; flex: 1; min-width: 80px;
    margin: 0 16px;
  }
  .practice-header .p-progress .fill {
    height: 100%; background: linear-gradient(90deg, #66bb6a, #43a047);
    border-radius: 2px; transition: width 0.5s ease; width: 0%;
  }
  .back-btn {
    padding: 6px 14px; border: 1px solid #c8e6c9; background: #fff;
    border-radius: 20px; cursor: pointer; font-size: 13px; color: #555;
    transition: all 0.3s;
  }
  .back-btn:hover { background: #e8f5e9; color: #2e7d32; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: #999;
  }
  .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }

  /* ─── 响应式：手机优先 ─── */
  @media (max-width: 768px) {
    body { padding: 10px; }
    .app { padding: 14px; border-radius: 18px; }
    .header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .header h1 { font-size: 20px; }
    .header .score { font-size: 14px; padding: 5px 14px; }

    /* 标签横向滚动 */
    .tabs { gap: 4px; padding-bottom: 4px; }
    .tab { font-size: 13px; padding: 7px 12px; white-space: nowrap; flex-shrink: 0; }

    /* 概览卡片单列 */
    .overview-grid { grid-template-columns: 1fr; }
    .overview-card { padding: 14px; }
    .overview-card .card-icon { font-size: 28px; }

    /* 知识点卡片触控优化 */
    .knowledge-card { padding: 12px 14px; }
    .knowledge-card .k-title { font-size: 14px; }
    .knowledge-card .k-body { font-size: 13px; line-height: 1.65; }

    /* 题干和选项触控友好 */
    .quiz-card .q-text { font-size: 15px; }
    .quiz-opt { padding: 12px 14px; font-size: 14px; min-height: 44px; }

    /* 练习面板 */
    .practice-header { flex-wrap: wrap; gap: 6px; }
    .practice-header .p-info { font-size: 13px; }
    .practice-header .p-progress { min-width: 60px; margin: 0 8px; }

    /* SVG 插图 */
    .svg-illustration { padding: 8px; }
    .svg-illustration svg { max-height: 150px; }

    /* 呼吸动画 */
    .breath-demo { flex-direction: column; align-items: center; }

    /* 总览按钮 */
    .anim-btn { font-size: 14px; padding: 9px 24px; }
  }

  @media (max-width: 400px) {
    .app { padding: 10px; border-radius: 14px; }
    .header h1 { font-size: 17px; }
    .tab { font-size: 12px; padding: 6px 10px; }
    .knowledge-card .k-body { font-size: 12px; }
    .quiz-card .q-text { font-size: 14px; }
    .quiz-opt { padding: 10px 12px; font-size: 13px; min-height: 40px; }
    .overview-card h3 { font-size: 14px; }
    .overview-card p { font-size: 12px; }
  }

  /* ─── 粒子背景装饰 ─── */
  .particle { position: fixed; pointer-events: none; opacity: 0.15; z-index: -1; }
</style>
</head>
<body>

<div class="app">
  <!-- 头部 -->
  <div class="header">
    <h1>🔬 初中生物中考复习</h1>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="score">🏆 掌握 <strong id="totalScore">0</strong>%</div>
      <button class="reset-btn" onclick="resetAll()">🔄 重新学习</button>
    </div>
  </div>

  <!-- 导航 -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="overview">📊 总览</button>
    <button class="tab" data-tab="topic0"><span class="dot none"></span>显微镜与细胞</button>
    <button class="tab" data-tab="topic1"><span class="dot none"></span>生物圈与生态</button>
    <button class="tab" data-tab="topic2"><span class="dot none"></span>人体生理</button>
    <button class="tab" data-tab="topic3"><span class="dot none"></span>生殖与遗传</button>
    <button class="tab" data-tab="topic4"><span class="dot none"></span>分类与进化</button>
    <button class="tab" data-tab="topic5"><span class="dot none"></span>实验与探究</button>
  </div>

  <!-- 内容 -->
  <div class="content">
    <!-- 总览 -->
    <div class="topic-content active" id="page-overview">
      <h2>📋 学习总览</h2>
      <p style="color:#666;margin-bottom:16px;">点击卡片进入对应章节学习，完成练习后状态自动保存 ✨</p>
      <div class="overview-grid" id="overviewGrid"></div>
      <div style="margin-top:20px;text-align:center;">
        <button class="anim-btn" onclick="startPractice()" style="font-size:15px;padding:10px 32px;border-radius:30px;">📝 综合练习</button>
      </div>
    </div>

    <!-- 各专题内容（由 JS 渲染） -->
    <div id="topicPages"></div>

    <!-- 综合练习面板 -->
    <div class="practice-panel" id="practicePanel">
      <div class="practice-header">
        <div><span class="back-btn" onclick="exitPractice()">← 返回</span></div>
        <div class="p-info">第 <strong id="pCur">1</strong> / <span id="pTotal">10</span> 题</div>
        <div class="p-progress"><div class="fill" id="pFill"></div></div>
        <div class="p-info" id="pScoreDisplay">✅ 0</div>
      </div>
      <div id="practiceContent"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  数据
// ══════════════════════════════════════════

const TOPICS = [
  {
    id: 'topic0', icon: '🔬', title: '显微镜与细胞',
    desc: '显微镜操作、细胞结构与功能、细胞分裂分化',
    points: [
      { title: '显微镜操作要点', body: '对光：低倍物镜对准通光孔 → 大光圈 → 反光镜调亮<br>调焦：粗准焦螺旋找到物像 → 细准焦螺旋调清晰<br>物像移动方向与玻片移动方向 <strong>相反</strong>（偏哪往哪移）<br>放大倍数 = 目镜 × 物镜 🎯 低倍镜下视野亮、范围大' },
      { title: '动、植物细胞结构', body: '📌 <strong>共同结构</strong>：细胞膜、细胞质、细胞核、线粒体<br>🌱 <strong>植物特有</strong>：细胞壁（支持和保护）、叶绿体（光合作用）、液泡（储存营养）<br>💡 线粒体→呼吸作用（所有活细胞都有）<br>💡 叶绿体→光合作用（仅绿色植物部分细胞有）' },
      { title: '细胞分裂与分化', body: '分裂：<span class="highlight">一个细胞 → 两个子细胞</span>，遗传物质先复制后均分<br>分化：<span class="highlight">相同细胞 → 不同形态功能</span> → 形成组织<br>分裂使细胞 <strong>数目增多</strong>，分化使细胞 <strong>种类增多</strong><br>细胞生长→分裂→分化→形成组织→器官→系统→个体' },
    ],
    quiz: [
      { q: '显微镜对光时，应选用什么物镜？', opts: ['高倍物镜', '低倍物镜', '任意物镜', '不用物镜'], ans: 1 },
      { q: '以下哪个结构是植物细胞特有、动物细胞没有的？', opts: ['细胞膜', '线粒体', '细胞壁', '细胞核'], ans: 2 },
      { q: '细胞分裂过程中，遗传物质如何变化？', opts: ['减少一半', '先复制后均分', '保持不变', '随机分配'], ans: 1 },
      { q: '制作洋葱表皮细胞临时装片时，用于染色的试剂是？', opts: ['清水', '生理盐水', '碘液', '酒精'], ans: 2 },
      { q: '显微镜下物像在视野左下方，要将物像移至中央，玻片应移向？', opts: ['左下方', '右上方', '左上方', '右下方'], ans: 0 },
      { q: '动物细胞和植物细胞中都含有的能量转换器是？', opts: ['叶绿体', '线粒体', '液泡', '细胞壁'], ans: 1 },
      { q: '细胞分化的结果是形成不同的？', opts: ['细胞', '组织', '器官', '系统'], ans: 1 },
    ]
  },
  {
    id: 'topic1', icon: '🌿', title: '生物圈与生态系统',
    desc: '生态系统组成、食物链/网、能量流动、生态平衡',
    points: [
      { title: '生态系统的组成', body: '<span class="tag">生产者</span> 植物（将光能转化为化学能）<br><span class="tag">消费者</span> 动物（直接或间接以植物为食）<br><span class="tag">分解者</span> 细菌、真菌（将有机物分解为无机物）<br><span class="tag">非生物部分</span> 阳光、水、空气、温度、土壤<br>⚠️ 三者缺一不可，共同维持生态平衡' },
      { title: '食物链与食物网', body: '起点：<span class="highlight">生产者</span>（植物）<br>箭头：指向 <strong>捕食者</strong>（→ 表示物质和能量流动方向）<br>示例：草 → 蝗虫 → 青蛙 → 蛇 → 鹰<br>💡 能量沿食物链<span class="highlight">单向流动、逐级递减</span>（越往上生物数量越少）<br>💡 有毒物质会 <strong>富集</strong>（营养级越高，含量越高）' },
      { title: '生态平衡与碳氧平衡', body: '生态平衡：生态系统能通过 <span class="highlight">自我调节</span> 维持相对稳定<br>⚠️ 自我调节能力 <strong>有限</strong>，超出范围会被破坏<br>碳—氧平衡：光合作用吸收 CO₂ 释放 O₂ → 维持大气成分稳定<br>温室效应 → CO₂ 过多（化石燃料燃烧、森林砍伐）' },
    ],
    quiz: [
      { q: '生态系统中，生产者主要是指什么？', opts: ['动物', '植物', '细菌', '真菌'], ans: 1 },
      { q: '食物链中，能量流动的特点是什么？', opts: ['循环流动', '双向流动', '单向递减', '逐级递增'], ans: 2 },
      { q: '有毒物质在食物链中会怎样变化？', opts: ['逐渐减少', '保持不变', '逐级富集', '被分解'], ans: 2 },
      { q: '下列哪项不属于生态系统的非生物部分？', opts: ['阳光', '温度', '植物', '土壤'], ans: 2 },
      { q: '在草→鼠→蛇→鹰的食物链中，数量最少的生物是？', opts: ['草', '鼠', '蛇', '鹰'], ans: 3 },

function getProgress() {
  try {
    const d = localStorage.getItem('bioReviewProgress');
    return d ? JSON.parse(d) : {};
  } catch(e) { return {}; }
}
function saveProgress(p) {
  try { localStorage.setItem('bioReviewProgress', JSON.stringify(p)); } catch(e) {}
}

// 获取某专题答题状态
function topicState(tid) {
  const p = getProgress();
  const key = tid;
  if (!p[key]) p[key] = { done: false, correct: 0, total: 0, answers: [] };
  return p[key];
}

function updateTopicProgress(tid, correct, total, answers) {
  const p = getProgress();
  const key = tid;
  p[key] = { done: correct === total, correct, total, answers };
  saveProgress(p);
  renderAll();
}

function getTotalProgress() {
  const p = getProgress();
  let totalQ = 0, totalC = 0;
  TOPICS.forEach(t => {
    const total = t.quiz.length;
    const correct = p[t.id] ? p[t.id].correct : 0;
    totalQ += total;
    totalC += correct;
  });
  return { correct: totalC, total: totalQ, pct: totalQ ? Math.round(totalC/totalQ*100) : 0 };
}

//  渲染
// ══════════════════════════════════════════

function renderAll() {
  // 保存当前激活的专题页面，防止重建后丢失 active 状态
  const activeEl = document.querySelector('.topic-content.active');
  const activeId = activeEl ? activeEl.id : null;

  renderOverview();
  renderTopicPages();
  updateTabsDots();
  updateTotalScore();

  // 恢复激活页面（总览页不在 topicPages 容器内，不受影响）
  if (activeId && activeId !== 'page-overview') {
    const page = document.getElementById(activeId);
    if (page) page.classList.add('active');
  }
}

function renderOverview() {
  const grid = document.getElementById('overviewGrid');
  grid.innerHTML = TOPICS.map(t => {
    const st = topicState(t.id);
    const total = t.quiz.length;
    const correct = st.correct || 0;
    const pct = Math.round(correct/total*100);
    return `
      <div class="overview-card" onclick="switchTab('${t.id}')">
        <div class="card-icon">${t.icon}</div>
        <h3>${t.title}</h3>
        <p>${t.desc}</p>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
        <div class="bar-label"><span>${correct}/${total} 题</span><span>${pct}%</span></div>
      </div>
    `;
  }).join('');
}

function renderTopicPages() {
  const container = document.getElementById('topicPages');
  container.innerHTML = TOPICS.map((t, idx) => {
    // SVG 插图：每个专题配一个
    const svgBlock = getSVGForTopic(t.id);
    // 知识点
    const pointsHtml = t.points.map((p, i) => `
      <div class="knowledge-card">
        <div class="k-title"><span class="num">${i+1}</span> ${p.title}</div>
        <div class="k-body">${p.body}</div>
      </div>
    `).join('');
    // 练习
    const quizHtml = t.quiz.map((q, qi) => `
      <div class="quiz-card" data-topic="${t.id}" data-qi="${qi}">
        <div class="q-text">${qi+1}. ${q.q}</div>
        <div class="quiz-options">
          ${q.opts.map((o, oi) => `<div class="quiz-opt" data-qi="${qi}" data-oi="${oi}" onclick="answerQuiz('${t.id}',${qi},${oi})">${o}</div>`).join('')}
        </div>
        <div class="quiz-result" id="qr-${t.id}-${qi}"></div>
      </div>
    `).join('');

    return `
      <div class="topic-content" id="page-${t.id}">
        <h2>${t.icon} ${t.title} <small>${t.desc}</small></h2>
        ${svgBlock}
        ${pointsHtml}
        <div class="quiz-section">
          <h3>📝 章节练习</h3>
          ${quizHtml}
        </div>
      </div>
    `;
  }).join('');
  // 恢复已答状态
  restoreQuizStates();
}

function restoreQuizStates() {
  const p = getProgress();
  TOPICS.forEach(t => {
    const st = p[t.id];
    if (!st || !st.answers) return;
    (t.quiz || []).forEach((q, qi) => {
      const ans = st.answers[qi];
      if (ans === undefined || ans === null) return;
      const card = document.querySelector(`.quiz-card[data-topic="${t.id}"][data-qi="${qi}"]`);
      if (!card) return;
      const opts = card.querySelectorAll('.quiz-opt');
      opts.forEach(el => el.classList.add('disabled'));
      const correct = ans === q.ans;
      opts[q.ans].classList.add('correct');
      if (!correct) opts[ans].classList.add('wrong');
      const resultEl = document.getElementById(`qr-${t.id}-${qi}`);
      if (resultEl) {
        resultEl.className = `quiz-result show ${correct ? 'correct' : 'wrong'}`;
        resultEl.textContent = correct ? '✅ 回答正确！' : `❌ 正确答案：${q.opts[q.ans]}`;
      }
    });
  });
}

function updateTabsDots() {
  document.querySelectorAll('.tab[data-tab]').forEach(el => {
    const tid = el.dataset.tab;
    if (tid === 'overview') return;
    const st = topicState(tid);
    const dot = el.querySelector('.dot');
    if (!dot) return;
    if (st.total === 0) dot.className = 'dot none';
    else if (st.correct === st.total) dot.className = 'dot done';
    else dot.className = 'dot partial';
  });
}

function updateTotalScore() {
  const tp = getTotalProgress();
  document.getElementById('totalScore').textContent = tp.pct;
}

//  交互
// ══════════════════════════════════════════

// 标签切换
document.querySelectorAll('.tab').forEach(el => {
  el.addEventListener('click', function() {
    const tab = this.dataset.tab;
    switchTab(tab);
  });
});

function switchTab(tab) {
  if (tab === 'practice') return;
  // 隐藏综合练习
  document.getElementById('practicePanel').classList.remove('active');
  document.getElementById('practicePanel').style.display = 'none';
  // 切换 tab active
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`)?.classList.add('active');
  // 切换页面
  document.querySelectorAll('.topic-content').forEach(el => el.classList.remove('active'));
  const page = document.getElementById(`page-${tab}`);
  if (page) page.classList.add('active');
  // 总览特殊处理
  document.getElementById('page-overview').classList.toggle('active', tab === 'overview');
  // 滚动到顶
  document.querySelector('.content').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 章节内答题
function answerQuiz(tid, qi, oi) {
  const p = getProgress();
  const topic = TOPICS.find(t => t.id === tid);
  if (!topic) return;
  const st = topicState(tid);
  if (st.answers && st.answers[qi] !== null && st.answers[qi] !== undefined) return; // 已答

  const q = topic.quiz[qi];
  const correct = oi === q.ans;

  // UI
  const card = document.querySelector(`.quiz-card[data-topic="${tid}"][data-qi="${qi}"]`);
  if (!card) return;
  const opts = card.querySelectorAll('.quiz-opt');
  opts.forEach(el => el.classList.add('disabled'));
  opts[q.ans].classList.add('correct');
  if (!correct) opts[oi].classList.add('wrong');

  const resultEl = document.getElementById(`qr-${tid}-${qi}`);
  if (resultEl) {
    resultEl.className = `quiz-result show ${correct ? 'correct' : 'wrong'}`;
    resultEl.textContent = correct ? '✅ 回答正确！很棒！' : `❌ 再想想哦！正确答案：${q.opts[q.ans]}`;
  }

  // 更新进度
  const answers = st.answers || [];
  answers[qi] = oi;
  let correctCount = 0, totalCount = topic.quiz.length;
  topic.quiz.forEach((_, idx) => {
    if (answers[idx] !== null && answers[idx] !== undefined && answers[idx] === topic.quiz[idx].ans) correctCount++;
  });
  updateTopicProgress(tid, correctCount, totalCount, answers);
}

// ══════════════════════════════════════════
//  综合练习
// ══════════════════════════════════════════

let practiceQuestions = [];
let practiceIdx = 0;
let practiceCorrect = 0;
let practiceAnswered = false;

function startPractice() {
  // 收集所有未答或者全部重新来
  const allQ = [];
  TOPICS.forEach(t => {
    (t.quiz || []).forEach((q, qi) => {
      allQ.push({ ...q, tid: t.id, qi });
    });
  });
  // 打乱
  for (let i = allQ.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
  }
  practiceQuestions = allQ;
  practiceIdx = 0;
  practiceCorrect = 0;
  practiceAnswered = false;

  // 切换显示
  document.querySelectorAll('.topic-content').forEach(el => el.classList.remove('active'));
  document.getElementById('page-overview').classList.remove('active');
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

  const panel = document.getElementById('practicePanel');
  panel.classList.add('active');
  panel.style.display = 'block';

  renderPracticeQuestion();
}

function renderPracticeQuestion() {
  const total = practiceQuestions.length;
  const idx = practiceIdx;
  if (idx >= total) {
    document.getElementById('practiceContent').innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🎉</div>
        <h3 style="color:#2e7d32;margin-bottom:8px;">综合练习完成！</h3>
        <p style="font-size:16px;">答对 <strong style="color:#2e7d32;font-size:24px;">${practiceCorrect}</strong> / ${total} 题</p>
        <p style="margin-top:12px;color:#888;">掌握率 ${Math.round(practiceCorrect/total*100)}%</p>
        <button class="anim-btn" onclick="startPractice()" style="margin-top:16px;padding:10px 28px;">🔄 再来一次</button>
        <button class="back-btn" onclick="exitPractice()" style="margin-top:10px;display:inline-block;margin-left:10px;">返回总览</button>
      </div>
    `;
    document.getElementById('pCur').textContent = total;
    document.getElementById('pTotal').textContent = total;
    document.getElementById('pFill').style.width = '100%';
    document.getElementById('pScoreDisplay').textContent = `✅ ${practiceCorrect}`;
    return;
  }

  const q = practiceQuestions[idx];
  document.getElementById('pCur').textContent = idx + 1;
  document.getElementById('pTotal').textContent = total;
  document.getElementById('pFill').style.width = `${(idx/total)*100}%`;
  document.getElementById('pScoreDisplay').textContent = `✅ ${practiceCorrect}`;
  practiceAnswered = false;

  // 找到专题名称
  const topic = TOPICS.find(t => t.id === q.tid);
  const topicLabel = topic ? `${topic.icon} ${topic.title}` : '';

  document.getElementById('practiceContent').innerHTML = `
    <div class="quiz-card">
      <div class="q-text" style="margin-bottom:16px;">
        <span style="font-size:12px;color:#999;display:block;margin-bottom:4px;">${topicLabel}</span>
        <strong>${q.q}</strong>
      </div>
      <div class="quiz-options" id="practiceOptions">
        ${q.opts.map((o, oi) => `<div class="quiz-opt" data-oi="${oi}" onclick="answerPractice(${oi})">${o}</div>`).join('')}
      </div>
      <div class="quiz-result" id="practiceResult"></div>
      <div style="margin-top:12px;text-align:right;">
        <button class="back-btn" id="nextBtn" onclick="nextPractice()" style="display:none;padding:8px 24px;background:#43a047;color:#fff;border:none;">下一题 →</button>
      </div>
    </div>
  `;
}

function answerPractice(oi) {
  if (practiceAnswered) return;
  practiceAnswered = true;
  const q = practiceQuestions[practiceIdx];
  const correct = oi === q.ans;

  const opts = document.querySelectorAll('#practiceOptions .quiz-opt');
  opts.forEach(el => el.classList.add('disabled'));
  opts[q.ans].classList.add('correct');
  if (!correct) opts[oi].classList.add('wrong');

  const resultEl = document.getElementById('practiceResult');
  if (resultEl) {
    resultEl.className = `quiz-result show ${correct ? 'correct' : 'wrong'}`;
    resultEl.textContent = correct ? '✅ 回答正确！' : `❌ 正确答案：${q.opts[q.ans]}`;
  }

  if (correct) practiceCorrect++;

  // 更新对应专题进度
  const p = getProgress();
  const st = topicState(q.tid);
  const topic = TOPICS.find(t => t.id === q.tid);
  if (topic) {
    const answers = st.answers || [];
    answers[q.qi] = oi;
    let cc = 0, tt = topic.quiz.length;
    topic.quiz.forEach((_, idx) => {
      if (answers[idx] !== null && answers[idx] !== undefined && answers[idx] === topic.quiz[idx].ans) cc++;
    });
    updateTopicProgress(q.tid, cc, tt, answers);
  }

  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('practiceResult').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextPractice() {
  practiceIdx++;
  renderPracticeQuestion();
}

function exitPractice() {
  document.getElementById('practicePanel').classList.remove('active');
  document.getElementById('practicePanel').style.display = 'none';
  switchTab('overview');
}

// 重新学习：清除所有进度
function resetAll() {
  if (!confirm('确定要清除所有学习进度吗？\n所有答题记录将被清空，可重新学习。')) return;
  try { localStorage.removeItem('bioReviewProgress'); } catch(e) {}
  // 重置综合练习状态
  practiceIdx = 0;
  practiceCorrect = 0;
  practiceAnswered = false;
  practiceQuestions = [];
  // 重新渲染
  renderAll();
  switchTab('overview');
}

renderAll();
